---
# Example events config

- id: example-event
  name: Example Event
  description: |
    An example event.
  date: 2024-07-04
  open: true
  visible: true

  # Registration options
  registration_options:
    - id: standard
      name: Standard
      description: Standard registration.

    - id: vip
      name: VIP
      description: VIP level.

  # Interviews available for adding a registration
  add_interviews:
    - id: http://localhost:8001/interviews/new-registration

  # Interviews available for changing a registration
  change_interviews:
    - id: http://localhost:8001/interviews/update-name
    - id: http://localhost:8001/interviews/upgrade
      when: "'vip' not in registration.option_ids"

  # Interviews available for adding a registration via the admin interface
  admin_add_interviews:
    - id: http://localhost:8001/interviews/new-registration

  # Interviews to change interviews via the admin interface
  admin_change_interviews:
    - id: http://localhost:8001/interviews/update-name

  # The interview to use for check-in
  check_in_interview: http://localhost:8001/interviews/check-in

  # Basic pricing rules
  pricing_rules:
    - type_id: standard
      name: Standard
      description: Standard registration.
      price: 5000
      when: "'standard' in added_option_ids"

    - type_id: vip
      name: VIP Upgrade
      description: VIP level upgrade.
      price: 2500
      when: "'vip' in added_option_ids"

    - type_id: name-change
      name: Name Change
      description: Registration name change/transfer.
      price: 0
      when:
        - registration.old_data.first_name
        - registration.old_data.last_name
        - registration.old_data.first_name != registration.new_data.first_name
        - registration.old_data.last_name != registration.new_data.last_name

  # Display options
  display_options:
    # Registration display template in the self-service view.
    registration:
      title: "{{ registration.display_name }}"
      subtitle: >-
        {% if "vip" in registration.option_ids -%}
        VIP
        {%- else -%}
        Standard
        {%- endif %}
      description: |
        {% if "vip" in registration.option_ids -%}
        VIP level registration.
        {%- else -%}
        Standard registration.
        {%- endif %}
