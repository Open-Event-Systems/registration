# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        exclude: (package-lock\.json|poetry\.lock)$

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--profile, black, --filter-files, --line-length, "88"]

  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
        types_or:
          - javascript
          - jsx
          - ts
          - tsx
          - yaml
          - markdown
          - json

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        exclude: ^python/registration/alembic/versions/
        additional_dependencies:
          - flake8-simplify
          - flake8-newspaper-style
          - flake8-cognitive-complexity
          - flake8-docstrings
          - flake8-annotations

  # mypy, for each Python package
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        name: mypy (util)
        files: ^python/util
        args: [--config-file=python/util/pyproject.toml]
        additional_dependencies:
          - attrs
          - cattrs
          - loguru
          - blacksheep
          - orjson
          - pytest

      - id: mypy
        name: mypy (template)
        files: ^python/template
        args: [--config-file=python/template/pyproject.toml]
        additional_dependencies:
          - attrs
          - cattrs
          - jinja2
          - pytest
