# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        exclude: (package-lock\.json|poetry\.lock)$

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--profile, black, --filter-files, --line-length, "88"]

  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
        types_or:
          - javascript
          - jsx
          - ts
          - tsx
          - yaml
          - markdown
          - json

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        exclude: ^python/registration/alembic/versions/
        additional_dependencies:
          - flake8-simplify
          - flake8-newspaper-style
          - flake8-cognitive-complexity
          - flake8-docstrings
          - flake8-annotations

  # pyright, for each Python package
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.349
    hooks:
      - id: pyright
        name: pyright (util)
        files: ^python/util
        args: [-p, python/util]
      - id: pyright
        name: pyright (template)
        files: ^python/template
        args: [-p, python/template]
      - id: pyright
        name: pyright (interview)
        files: ^python/interview
        args: [-p, python/interview]
